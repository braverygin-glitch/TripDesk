<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행스케줄정리프로그램</title>

    <link rel="stylesheet" href="style.css">

    <!-- 아이폰 홈화면(PWA) 준비 -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>

<div class="app">

    <!-- 상단 -->
    <header class="header">

        <div>

            <div class="logo">
                🧳 여행스케줄정리프로그램
            </div>

            <div class="trip-name">
                현재 여행
            </div>

            <h1 id="tripTitle">
                여행을 선택하세요
            </h1>

        </div>

        <button id="refreshButton" class="refresh-button">
            ↻
        </button>

    </header>

    <!-- 메인 화면 -->
    <main id="screen">

    </main>

    <!-- 하단 메뉴 -->
    <nav class="bottom-nav">

        <button class="nav-item active"
                data-screen="home">

            🏠
            <span>홈</span>

        </button>

        <button class="nav-item"
                data-screen="schedule">

            📅
            <span>일정</span>

        </button>

        <button class="nav-item"
                data-screen="places">

            📍
            <span>장소</span>

        </button>

        <button class="nav-item"
                data-screen="booking">

            🎫
            <span>예약</span>

        </button>

        <button class="nav-item"
                data-screen="required">

            ⭐
            <span>필수</span>

        </button>

        <button class="nav-item"
                data-screen="check">

            ☑
            <span>체크</span>

        </button>

        <button class="nav-item"
                data-screen="setting">

            ⚙
            <span>설정</span>

        </button>

    </nav>

</div>

<script src="trip.js"></script>
<script src="app.js"></script>

</body>
</html>
